<body class="font-body-md text-on-surface antialiased overflow-hidden">
<!-- Subtle Background Pattern -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-0">
<div class="absolute inset-0" style="background-image: radial-gradient(#973100 1px, transparent 1px); background-size: 32px 32px;"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 min-h-screen flex items-center justify-center px-margin-mobile md:px-margin-desktop">
<!-- Login Card Wrapper -->
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Branding Header -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center mb-4 p-4 rounded-full bg-surface-container-high">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Akwaaba Modern Kitchen</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1 uppercase tracking-widest">Staff Portal Access</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest p-8 md:p-10 rounded-2xl login-card-shadow border border-outline-variant/30">
<form class="space-y-6" id="loginForm" onsubmit="event.preventDefault();">
<!-- Staff ID Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface" for="staff-id">Staff ID</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant/60" data-icon="badge">badge</span>
<input class="w-full pl-12 pr-4 h-[56px] bg-surface rounded-xl border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-on-surface-variant/40 font-body-md text-body-md" id="staff-id" name="staff-id" placeholder="Enter your ID" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-sm text-label-sm text-on-surface" for="password">Password</label>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant/60" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 h-[56px] bg-surface rounded-xl border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-on-surface-variant/40 font-body-md text-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 border-2 border-outline-variant rounded peer-checked:bg-primary peer-checked:border-primary transition-all"></div>
<span class="absolute material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
</div>
<span class="font-body-md text-label-sm text-on-surface-variant group-hover:text-on-surface">Remember Me</span>
</label>
</div>
<!-- Log In Button -->
<button class="w-full h-[56px] bg-primary-container text-white font-bold text-body-lg rounded-2xl flex items-center justify-center space-x-2 shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all" type="submit">
<span>Log In</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 flex flex-col items-center space-y-4">
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
<div class="h-px w-16 bg-outline-variant/50"></div>
<p class="font-label-sm text-label-sm text-on-surface-variant/60 text-center">

<div class="h-1 bg-cover bg-center rounded-full" data-alt="Top down view of a minimalist contemporary food presentation on a white artisanal plate, vibrant greens and earthy browns, elegant restaurant setting." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBqvO4zFK1MQjRKa6jAag-02J4kgrJTbuzwSgGuwYsZeQoAMEaW9phFV29L8AIY5gIQxQ9E5D3A2SBefEkpe2MERWJXmRlmhT3txxn3e1E--vy7naC82bNEL0nmuqBsj9rIcmGJ5itLj6DfpoZUiHuxy3GBda1PvLYThzgSn9-k4d6MzUvGRweTVsftWgMC0ixCd_pOsggulTZP-VgdNE3x-iDJOMorDYCgdrDpINE2WeTnmN5gMTtNH3j3nPHP4TjH5ebqhrshkoFy')"></div>
</div>
</div>
</main>
<script>
        // Micro-interactions for login states
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>`;
            
            // Simulate processing
            setTimeout(() => {
                btn.classList.replace('bg-primary-container', 'bg-green-600');
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span><span>Authenticated</span>`;
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.replace('bg-green-600', 'bg-primary-container');
                    btn.innerHTML = originalContent;
                }, 1500);
            }, 1000);
        });

        // Password visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            const icon = type === 'password' ? 'visibility' : 'visibility_off';
            toggleBtn.querySelector('span').textContent = icon;
        });
    </script>
